name: Deploy to GitHub Pages

# Publishes the site via the modern GitHub Actions Pages pipeline.
# Replaces the legacy branch build, whose queue-less publisher kept jamming
# ("building… 0s") when the every-5-min data-refresh commits collided with it.
on:
  push:
    branches: [ main ]
  # The data-refresh workflow pushes commits with the built-in GITHUB_TOKEN,
  # and token pushes do NOT trigger `push` workflows (anti-recursion rule).
  # So we also deploy whenever that workflow finishes, to keep live scores fresh.
  workflow_run:
    workflows: [ "Refresh World Cup data" ]
    types: [ completed ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time. Newer queued runs supersede older *pending* ones,
# but an in-progress deploy is always allowed to finish — so frequent data
# commits queue cleanly instead of jamming the build.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # For workflow_run triggers, only deploy if the data refresh actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
