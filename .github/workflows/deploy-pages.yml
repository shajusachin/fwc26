name: Deploy to GitHub Pages

# Publishes the site via the modern GitHub Actions Pages pipeline.
#
# Deploys only on real code/content pushes to main (plus manual dispatch).
# Live match data is NOT deployed here: the page fetches data-compact.json
# straight from raw.githubusercontent.com, so the hourly data-refresh updates
# scores WITHOUT any redeploy. That removes the old workflow_run trigger that
# turned every data refresh into a Pages redeploy — the source of the recurring
# transient "Deployment failed, try again later" failure emails.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-progress deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # The Pages backend can transiently reject a deploy ("try again later"),
      # even for a lone run. Try once, and if it fails, wait and retry once more.
      # deploy-pages only publishes the already-uploaded artifact (it does not
      # re-upload), so calling it twice in the same job is safe.
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (retry)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
